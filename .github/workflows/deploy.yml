name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'

      - name: Install System Dependencies (Pandoc & LaTeX for Chinese Support)
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex texlive-fonts-recommended texlive-plain-generic fonts-noto-cjk texlive-lang-chinese fonts-freefont-ttf

      - name: Install NPM Dependencies
        run: npm ci

      - name: Cache PDFs
        id: cache-pdfs
        uses: actions/cache@v4
        with:
          path: public/pdfs
          key: pdfs-${{ hashFiles('src/content/research/*.md') }}
          restore-keys: |
            pdfs-

      - name: Generate PDFs
        run: node scripts/generate-pdfs.js

      - name: Build Astro Site
        run: npm run build

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
